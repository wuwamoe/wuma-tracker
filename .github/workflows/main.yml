name: "publish"

on:
  push:
    branches:
      - release

# This is the example from the readme.
# On each push to the `release` branch it will create or update a GitHub release, build your app, and upload the artifacts to the release.

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            args: ""
            rust-targets: ""
          - platform: "macos-latest"
            args: >-
              --target universal-apple-darwin
              --bundles dmg
              --config '{"bundle":{"createUpdaterArtifacts":false,"macOS":{"signingIdentity":"-"}}}'
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      # - name: install dependencies (ubuntu only)
      #   if: matrix.platform == 'ubuntu-22.04' # This must match the platform value defined above.
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      #   # webkitgtk 4.0 is for Tauri v1 - webkitgtk 4.1 is for Tauri v2.
      #   # You can remove the one that doesn't apply to your app to speed up the workflow a bit.
      - name: install bun
        uses: oven-sh/setup-bun@v2

      - name: install frontend dependencies
        run: bun install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.WUMA_TRACKER_SIGN_SECRET }}
        with:
          tagName: v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          releaseName: "App v__VERSION__"
          releaseBody: |
            ## 설치 방법

            ### Windows
            `.exe` 또는 `.msi` 파일을 다운로드하여 실행하세요.

            ### macOS
            `.dmg` 파일을 다운로드한 후 앱을 Applications에 드래그하세요.

            > **⚠️ macOS 보안 경고 해제**
            > 미서명 앱이므로 처음 실행 시 차단될 수 있습니다.
            > 1. 앱을 우클릭 → **열기** → **열기** 클릭
            > 2. 또는 **시스템 설정 → 개인 정보 보호 및 보안 → 확인 없이 열기**
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
